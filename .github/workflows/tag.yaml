name: Tag and Release
# test workflow が main で成功したときだけタグとリリースを作成する
on:
  workflow_run:
    workflows:
      - Run Test install dotfiles
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリースを作成するために必要
      actions: write # push.yaml を workflow_dispatch で起動するために必要
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Create tag and release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --tags origin

          semver_latest() {
            git tag -l '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1
          }

          # このコミットに semver タグが既にあれば再利用（再実行・リリースのみ失敗時）
          existing_tag=$(git tag -l '[0-9]*.[0-9]*.[0-9]*' --points-at "$HEAD_SHA" --sort=-v:refname | head -n1)
          if [ -n "$existing_tag" ]; then
            new_tag="$existing_tag"
            echo "コミット ${HEAD_SHA} に既存タグ: ${new_tag}"
          else
            latest_tag=$(semver_latest)
            [ -z "$latest_tag" ] && latest_tag="0.0.0"
            if ! [[ "$latest_tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              latest_tag="0.0.0"
            fi
            echo "最新の semver タグ: ${latest_tag}"

            IFS='.' read -r major minor patch <<< "$latest_tag"
            new_patch=$((patch + 1))
            new_tag="${major}.${minor}.${new_patch}"
            echo "新しいタグ: ${new_tag}"

            if git ls-remote --tags origin "refs/tags/${new_tag}" | grep -q .; then
              echo "タグ ${new_tag} は既にリモートに存在する（GHCR ビルドのみ再実行）"
            else
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              git config --global user.name "github-actions[bot]"
              git tag "$new_tag" "$HEAD_SHA"
              git push origin "$new_tag"
            fi
          fi

          if ! gh release view "$new_tag" >/dev/null 2>&1; then
            gh release create "$new_tag" \
              --title="$new_tag" \
              --notes="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --latest \
              --generate-notes
          else
            echo "リリース ${new_tag} は既に存在する"
          fi

          echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"

      # tag push の webhook が push.yaml を起動しない場合の保険（0.8.123 など）
      - name: Trigger GHCR build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          echo "push.yaml を ref=${tag} で起動"
          gh workflow run push.yaml --ref "$tag"
