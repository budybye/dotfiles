# https://starship.rs/ja-jp/config/

"$schema" = 'https://starship.rs/config-schema.json'

# гВЈгВІгГЂгГЧгГ≠гГ≥гГЧгГИгБЃйЦУгБЂз©Їи°МгВТињљеК†гБЧгБЊгБЩ
add_newline = true

# гВњгВ§гГ†гВҐгВ¶гГИжЩВйЦУ
scan_timeout = 420

# гВ≥гГЮгГ≥гГЙгВњгВ§гГ†гВҐгВ¶гГИ
command_timeout = 4422

# гВЂгГ©гГЉгГСгГђгГГгГИгБЃеЃЪзЊ©
palette = 'color'

# зґЩзґЪгГЧгГ≠гГ≥гГЧгГИгБЃи°®з§Ї
# continuation_prompt = "вЦґвЦґ"

# дЄ¶гБ≥й†Ж
format = """
[пВЫ ](gray)\
[вЦСвЦТвЦУ](gray)\
$os\
$username\
$hostname\
[оВі](fg:gray bg:navy)\
$directory\
[оВі](fg:navy bg:dark)\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
[оВі](fg:dark bg:dd)\
$fill\
$nodejs\
$rust\
$golang\
$php\
$java\
$python\
$ruby\
$bun\
$package\
[оВі](fg:dd bg:ddd)\
$time\
$battery\
$memory_usage\
[оВі](fg:ddd bg:ddd)\
$cmd_duration\
[оВі](fg:ddd)\
$line_break\
$character\
$localip\
$docker_context\
$custom\
$shell\
"""

# right_format = """
# $cmd_duration
# $time
# """

# иЙ≤гБЃи®≠еЃЪ
[palettes.color]
# Kanagawa Dragon
gray = '#a6a69c'    # dragonGray
white = '#c5c9c5'   # dragonWhite
navy = '#8ba4b0'    # dragonBlue2
dark = '#8992a7'    # dragonViolet
dd = '#181616'      # dragonBlack3
ddd = '#12120f'     # dragonBlack1
red = '#c4746e'     # dragonRed
green = '#87a987'   # dragonGreen
yellow = '#b6927b'  # dragonOrange
blue = '#8ea4a2'    # dragonAqua

[os]
disabled = false
style = "fg:dd bg:gray"

[os.symbols]
Windows = "оШ™ "
Ubuntu = "пМЫ "
Linux = "пМЪ "
Macos = "оЬС "
Raspbian = "пМХ "
RedHatEnterprise = "пМЦ "

# гГ¶гГЉгВґгГЉеРН
[username]
style_user = "fg:dd bg:gray"
style_root = "fg:red bg:gray"
format = '[($user)@]($style bold)'
disabled = false
show_always = true

# гГЫгВєгГИеРН
[hostname]
ssh_only = false
style = "fg:dd bg:gray"
format = '[$ssh_symbol$hostname:]($style bold)'
disabled = false

[directory]
style = "fg:dd bg:navy"
format = "[пДХ $path]($style bold)"
truncate_to_repo = false
truncation_length = 5
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "пЬШ "
"Downloads" = "пАЩ  "
"Music" = "пАБ  "
"Pictures" = "пАЊ  "

[git_branch]
symbol = "пРШ "
style = "fg:dd bg:dark"
format = '[ $symbol $branch ]($style bold)'

[git_status]
style = "fg:dd bg:dark"
format = '[($all_status$ahead_behind)]($style bold)'
conflicted = "рЯТ• "
ahead = "рЯПОрЯТ® "
behind = "рЯШ∞ "
diverged = "рЯШµ "
untracked = "рЯМЪ "
stashed = "рЯУ¶ "
modified = "рЯУЭ "
staged = 'рЯФ¶ '
renamed = "рЯПЈ "
deleted = "рЯЧС "

[nodejs]
symbol = "оЬШ "
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[rust]
symbol = "оЮ® "
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[golang]
symbol = "п≥С "
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[php]
symbol = "оШИ "
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[java]
symbol = 'рЯМЯ '
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[python]
symbol = 'оИµ '
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[ruby]
symbol = 'оЮ® '
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[bun]
symbol = 'рЯНЮ '
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[package]
symbol = "п£Ц "
style = "fg:gray bg:dd"
format = '[ $symbol($version)]($style bold)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "fg:gray bg:ddd"
format = '[пРЇ $time]($style bold)'

# гГРгГГгГЖгГ™гГЉи°®з§Ї
[battery]
full_symbol = 'пЙА '
charging_symbol = 'пЗ¶ '
discharging_symbol = 'вЪ†пЄП '
disabled = false
format = '[ $symbol$percentage]($style bold)'

# гГРгГГгГЖгГ™гГЉгВТи°®з§ЇгБЩгВЛгВњгВ§гГЯгГ≥гВ∞гАБи°®з§ЇгБЩгВЛйЪЫгБЃжЦЗе≠ЧгБЃиЙ≤гБЩгВЛйЪЫгБЃжЦЗе≠ЧгБЃиЙ≤
[[battery.display]]
threshold = 101
style = "fg:gray bg:ddd"

[memory_usage]
disabled = false
threshold = -1
symbol = "пИА "
style = "fg:gray bg:ddd"
format = '[ $symbol${ram_pct}]($style bold)'

[cmd_duration]
style = "fg:navy bg:ddd"
min_time = 4200
format = '[$duration]($style bold)'

# IPгВҐгГЙгГђгВє
[localip]
ssh_only = true
style = "fg:dd bg:gray"
format = '[@$localipv4]($style bold) '
disabled = false

[docker_context]
format = "[рЯРЛ$context](fg:blue bold) "

[character]
success_symbol = "[вЩ®пЄО ](fg:green bold)"
error_symbol = "[вЩ®пЄО ](fg:red bold)"

[shell]
fish_indicator = 'пЬє '
powershell_indicator = 'пС†_ '
style = 'fg:green'
# format = '[$indicatorпЕХ](strikethrough fg:red bold)пЙЕ [kush]($style bold) [пЕЪ](fg:yellow bold) '
format = '[$indicator](fg:green bold) [пЕЪ](fg:yellow bold) '
#format = '[$indicator\$]($style bold) '
disabled = false

# x86 or arm64
[custom.arch]
command = "uname -m"
when = """ test $(uname -m) = "x86_64" """
style = "bold gray"
format = "[$output]($style bold) "

[gcloud]
disabled = true
